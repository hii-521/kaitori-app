<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>買取計算</title>

<style>
body{
font-family:sans-serif;
background:#f4f6f8;
margin:0;
padding:15px;
}

.header{
background:#16354d;
color:white;
font-size:32px;
font-weight:bold;
text-align:center;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.row{

display:flex;
align-items:center;
justify-content:space-between;
padding:12px 0;


}

.amount{
  width:100%;
  text-align:center;
  font-weight:bold;
  padding-bottom:12px;
  margin-bottom:12px;
  border-bottom:1px solid #e5e5e5;
}

.name{
font-weight:bold;
width:180px;
}

.price{
  width:120px;
  text-align:right;
  white-space:nowrap;
}

input{
width:90px;
padding:8px;
font-size:16px;
text-align:right;
}

.amount{
width:100%;
text-align:center;
font-weight:bold;
margin-top:8px;
}

.total{
    font-size:38px;
    font-weight:bold;
    text-align:center;
    color:black;
}
</style>
</head>

<body>

<div style="
text-align:center;
font-size:18px;
font-weight:bold;
color:#666;
margin-bottom:8px;">
<span id="today"></span>
</div>

<div class="header">
買取計算
</div>

<div class="card">
<div style="text-align:center;font-size:24px;font-weight:bold;margin-bottom:10px;">
総売上
</div>

<div class="total" id="total">0円</div>

<div style="text-align:center;font-size:18px;font-weight:bold;">
合計買取
</div>

<div class="total" id="buyTotal">
0円
</div>

<div style="margin-top:15px;text-align:center;">

<input
type="text"
id="staff1"
placeholder="担当者①"
style="
width:80%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;">

<input
type="text"
id="staff2"
placeholder="担当者②"
style="
width:80%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;">

<button
onclick="sendLineReport()"
style="
width:80%;
padding:12px;
background:#06C755;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
font-size:16px;">
個別LINE報告
</button>

</div>

<div style="
width:200px;
background:#cfcfcf;
height:3px;
margin:10px auto 15px auto;
"></div>

<div style="text-align:center;margin-top:10px;font-size:16px;font-weight:500;">
金プラチナ買取
</div>

<div class="total" id="metalTotal" style="font-size:28px;color:#16354d;">
0円
</div>

<div style="text-align:center;margin-top:10px;font-size:16px;font-weight:500;">
その他買取
</div>

<div class="total" id="freeBuyTotal" style="font-size:28px;color:#16354d;">
0円
</div>

<div style="text-align:center;margin-top:15px;">
買取率
<input
type="number"
id="rate"
value="11"
style="width:70px;text-align:center;"
> %

<button onclick="applyRate()">
全金種に反映
</button>

<button onclick="resetAll()"
style="
background:#d9534f;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;">
リセット
</button>

</div>

減価率
<span id="lossRate">0.0%</span>

<div class="card" id="list"></div>

<div class="card">

<!-- フリー1 -->
<div style="text-align:right;margin-bottom:10px;">
<input type="number" id="freeRate1" value="11" placeholder="%"
oninput="calc()">
</div>

<div class="row">
<input type="text" id="freeName1" placeholder="金種">
<input type="number" id="freePrice1" placeholder="単価"
oninput="calc()">
<input type="number" id="freeGram1" placeholder="g"
oninput="calc()">
</div>

<div class="amount" id="freeAmount1">
売 0円　<span style="color:#16354d;">買 0円</span>
</div>

<hr>

<!-- フリー2 -->
<div style="text-align:right;margin-bottom:10px;">
<input type="number" id="freeRate2" value="11" placeholder="%"
oninput="calc()">
</div>

<div class="row">
<input type="text" id="freeName2" placeholder="金種">
<input type="number" id="freePrice2" placeholder="単価"
oninput="calc()">
<input type="number" id="freeGram2" placeholder="g"
oninput="calc()">
</div>

<div class="amount" id="freeAmount2">
売 0円　<span style="color:#16354d;">買 0円</span>
</div>

<hr>

<!-- フリー3 -->
<div style="text-align:right;margin-bottom:10px;">
<input type="number" id="freeRate3" value="11" placeholder="%"
oninput="calc()">
</div>

<div class="row">
<input type="text" id="freeName3" placeholder="金種">
<input type="number" id="freePrice3" placeholder="単価"
oninput="calc()">
<input type="number" id="freeGram3" placeholder="g"
oninput="calc()">
</div>

<div class="amount" id="freeAmount3">
売 0円　<span style="color:#16354d;">買 0円</span>
</div>

<hr>

<!-- フリー4 -->
<div style="text-align:right;margin-bottom:10px;">
<input type="number" id="freeRate4" value="11" placeholder="%"
oninput="calc()">
</div>

<div class="row">
<input type="text" id="freeName4" placeholder="金種">
<input type="number" id="freePrice4" placeholder="単価"
oninput="calc()">
<input type="number" id="freeGram4" placeholder="g"
oninput="calc()">
</div>

<div class="amount" id="freeAmount4">
売 0円　<span style="color:#16354d;">買 0円</span>
</div>

<hr>

<!-- フリー5 -->
<div style="text-align:right;margin-bottom:10px;">
<input type="number" id="freeRate5" value="11" placeholder="%"
oninput="calc()">
</div>

<div class="row">
<input type="text" id="freeName5" placeholder="金種">
<input type="number" id="freePrice5" placeholder="単価"
oninput="calc()">
<input type="number" id="freeGram5" placeholder="g"
oninput="calc()">
</div>

<div class="amount" id="freeAmount5">
売 0円　<span style="color:#16354d;">買 0円</span>
</div>

</div>

  
<script>

const items = [

["K24IN",24438],
["K24",23980],
["K22",21930],
["K21.6",21458],
["K20",19893],
["K18",18304],
["K14",13719],
["K10",9628],
["K9",8511],
["K18WG",18318],
["K14WG",13733],

["PT1000IN",10048],
["PT1000",9880],
["PT950",9427],
["PT900",9584],
["PT850",9082],

["18/900 9:1",17256],
["18/900 5:5",13565],
["18/900 1:9",9865],

["18/850 9:1",17236],
["18/850 5:5",13314],
["18/850 1:9",9413],

["SV1000",361],
["SV925",322]

];

const list=document.getElementById("list");

items.forEach((item,i)=>{

list.innerHTML += `
<div class="row">
<div class="name">${item[0]}</div>
<div class="price">${item[1].toLocaleString()}円</div>
<input type="number"
step="0.1"
placeholder="g"
oninput="calc()"
id="g${i}"
style="width:60px;text-align:center;">
<input type="number"
step="0.1"
value="11"
placeholder="%"
oninput="calc()"
id="rate${i}"
style="width:60px;">
</div>

<div class="amount" id="a${i}">
売 0円　買 0円

</div>

</div>
`;

});
function applyRate(){

let rate =
parseFloat(document.getElementById("rate").value) || 0;

items.forEach((item,i)=>{
document.getElementById("rate"+i).value = rate;
});

calc();

}
function calc(){

let total=0;
let buyTotal=0;
let freeBuyTotal=0;

items.forEach((item,i)=>{

let g =
parseFloat(document.getElementById("g"+i).value) || 0;

let amount =
Math.round(g * item[1]);

let itemRate =
parseFloat(document.getElementById("rate"+i).value) || 0;

let buyAmount =
Math.round(amount * itemRate / 100);

document.getElementById("a"+i).innerHTML =
"売 " + amount.toLocaleString() + "円 " +
"<span style='color:#16354d;'>買 " +
buyAmount.toLocaleString() +
"円</span>";

total += amount;
buyTotal += buyAmount;

});

for(let i=1;i<=5;i++){

let freePrice =
parseFloat(document.getElementById("freePrice"+i).value)||0;

let freeGram =
parseFloat(document.getElementById("freeGram"+i).value)||0;

let freeRate =
parseFloat(document.getElementById("freeRate"+i).value)||0;

let freeSell =
Math.round(freePrice * freeGram);

let freeBuy =
Math.round(freeSell * freeRate / 100);

document.getElementById("freeAmount"+i).innerHTML =
"売 " + freeSell.toLocaleString() + "円　" +
"<span style='color:#16354d;'>買 " +
freeBuy.toLocaleString() +
"円</span>";

total += freeSell;
freeBuyTotal += freeBuy;
}


document.getElementById("buyTotal").innerHTML =
(buyTotal + freeBuyTotal).toLocaleString()+"円";
document.getElementById("metalTotal").innerHTML =
buyTotal.toLocaleString()+"円";

document.getElementById("freeBuyTotal").innerHTML =
freeBuyTotal.toLocaleString()+"円";


let lossRate = 0;

if(total > 0){
  lossRate = ((buyTotal + freeBuyTotal) / total) * 100;
}

let lossColor = "black";

if(lossRate >= 40){
  lossColor = "red";
}else if(lossRate >= 30){
  lossColor = "orange";
}

document.getElementById("lossRate").innerHTML =
'<span style="color:' + lossColor + ';">' +
lossRate.toFixed(1) +
'%</span>';

document.getElementById("total").innerHTML=
total.toLocaleString()+"円";

}
window.onload = function(){

const today = new Date();

const week = ["日","月","火","水","木","金","土"];

document.getElementById("today").innerHTML =
today.getFullYear() + "/" +
String(today.getMonth()+1).padStart(2,"0") + "/" +
String(today.getDate()).padStart(2,"0") +
"（" + week[today.getDay()] + "）";

}

function sendLineReport(){

  const staff1 =
  document.getElementById("staff1").value || "-";

  const staff2 =
  document.getElementById("staff2").value || "-";

  const buy =
  document.getElementById("buyTotal").innerText;

  const sale =
  document.getElementById("total").innerText;

  const profit =
  (
    parseInt(sale.replace(/[^0-9]/g,"")) -
    parseInt(buy.replace(/[^0-9]/g,""))
  ).toLocaleString() + "円";

  const text =
`【売上報告】

担当者①：${staff1}

担当者②：${staff2}

買取額：${buy}

売上：${sale}

利益：${profit}`;

  window.open(
    "https://line.me/R/msg/text/?"
    + encodeURIComponent(text)
  );

}

function resetAll(){

  if(!confirm("本当にすべての入力をリセットしますか？")){
    return;
  }

  document.querySelectorAll("input").forEach(input=>{

    if(input.id === "rate"){
      input.value = 11;
    }
    else if(input.id && input.id.startsWith("rate")){
      input.value = 11;
    }
    else if(input.id && input.id.startsWith("freeRate")){
      input.value = 11;
    }
    else{
      input.value = "";
    }

  });

  calc();

}
</script>

</body>
</html>
