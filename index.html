<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>買取計算</title>

<style>

body{
font-family:sans-serif;
background:#f4f6f8;
margin:0;
padding:15px;
}

.header{
background:#16354d;
color:white;
font-size:32px;
font-weight:bold;
text-align:center;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.row{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 0;
}

.name{
font-weight:bold;
width:180px;
}

.price{
width:120px;
text-align:right;
white-space:nowrap;
}

input{
width:90px;
padding:8px;
font-size:16px;
text-align:right;
}

.amount{
width:100%;
text-align:center;
font-weight:bold;
padding-bottom:12px;
margin-bottom:12px;
border-bottom:1px solid #e5e5e5;
}

.total{
font-size:38px;
font-weight:bold;
text-align:center;
color:black;
}

button{
cursor:pointer;
}

</style>
</head>

<body>

<div style="
text-align:center;
font-size:18px;
font-weight:bold;
color:#666;
margin-bottom:8px;">
<span id="today"></span>
</div>

<div class="header">
買取計算
</div>

<div class="card">

<div style="text-align:center;font-size:24px;font-weight:bold;margin-bottom:10px;">
総売上
</div>

<div class="total" id="total">0円</div>

<div style="text-align:center;font-size:18px;font-weight:bold;">
合計買取
</div>

<div class="total" id="buyTotal">0円</div>
<div style="text-align:center;margin:10px 0;">

端数調整

<input
type="number"
id="adjust"
value="0"
oninput="calc()"
style="
width:120px;
padding:8px;
text-align:center;
margin-left:10px;">

円

</div>

<div style="margin-top:15px;text-align:center;">

<input
type="text"
id="staff1"
placeholder="担当者①"
style="
width:80%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;">

<input
type="text"
id="staff2"
placeholder="担当者②"
style="
width:80%;
padding:10px;
margin-bottom:8px;
border-radius:8px;
border:1px solid #ccc;">

<button
onclick="saveCase()"
style="
width:80%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
font-size:16px;
margin-top:10px;">
案件保存
</button>

<button
onclick="selectReportType()"
style="
width:80%;
padding:12px;
background:#f59e0b;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
font-size:16px;
margin-top:10px;">
合算報告
</button>

<button
onclick="resetCases()"
style="
width:80%;
padding:12px;
background:#dc2626;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
font-size:16px;
margin-top:10px;">
データリセット
</button>

</div>

<div style="
width:200px;
background:#cfcfcf;
height:3px;
margin:10px auto 15px auto;">
</div>

<div style="text-align:center;font-size:16px;font-weight:500;">
金プラチナ買取
</div>

<div class="total" id="metalTotal"
style="font-size:28px;color:#16354d;">
0円
</div>

<div style="text-align:center;font-size:16px;font-weight:500;">
その他買取
</div>

<div class="total" id="freeBuyTotal"
style="font-size:28px;color:#16354d;">
0円
</div>

<div style="text-align:center;margin-top:15px;">

買取率

<input
type="number"
id="rate"
value="10"
style="width:70px;text-align:center;"> %

<button onclick="applyRate()">
全金種に反映
</button>

<button
onclick="resetAll()"
style="
background:#d9534f;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;">
リセット
</button>

</div>

減価率
<span id="lossRate">0.0%</span>

<div class="card" id="list"></div>

<div class="card">

<!-- フリー1 -->
<div style="text-align:right;margin-bottom:10px;">
<input type="number" id="freeRate1" value="10" oninput="calc()">
</div>

<div class="row">
<input type="text" id="freeName1" placeholder="金種">
<input type="number" id="freePrice1" placeholder="単価" oninput="calc()">
<input type="number" id="freeGram1" placeholder="g" oninput="calc()">
</div>

<div class="amount" id="freeAmount1">
売 0円　<span style="color:#16354d;">買 0円</span>
</div>

<hr>

<!-- フリー2 -->
<div style="text-align:right;margin-bottom:10px;">
<input type="number" id="freeRate2" value="10" oninput="calc()">
</div>

<div class="row">
<input type="text" id="freeName2" placeholder="金種">
<input type="number" id="freePrice2" placeholder="単価" oninput="calc()">
<input type="number" id="freeGram2" placeholder="g" oninput="calc()">
</div>

<div class="amount" id="freeAmount2">
売 0円　<span style="color:#16354d;">買 0円</span>
</div>

<hr>

<!-- フリー3 -->
<div style="text-align:right;margin-bottom:10px;">
<input type="number" id="freeRate3" value="10" oninput="calc()">
</div>

<div class="row">
<input type="text" id="freeName3" placeholder="金種">
<input type="number" id="freePrice3" placeholder="単価" oninput="calc()">
<input type="number" id="freeGram3" placeholder="g" oninput="calc()">
</div>

<div class="amount" id="freeAmount3">
売 0円　<span style="color:#16354d;">買 0円</span>
</div>

<hr>

<!-- フリー4 -->
<div style="text-align:right;margin-bottom:10px;">
<input type="number" id="freeRate4" value="10" oninput="calc()">
</div>

<div class="row">
<input type="text" id="freeName4" placeholder="金種">
<input type="number" id="freePrice4" placeholder="単価" oninput="calc()">
<input type="number" id="freeGram4" placeholder="g" oninput="calc()">
</div>

<div class="amount" id="freeAmount4">
売 0円　<span style="color:#16354d;">買 0円</span>
</div>

<hr>

<!-- フリー5 -->
<div style="text-align:right;margin-bottom:10px;">
<input type="number" id="freeRate5" value="10" oninput="calc()">
</div>

<div class="row">
<input type="text" id="freeName5" placeholder="金種">
<input type="number" id="freePrice5" placeholder="単価" oninput="calc()">
<input type="number" id="freeGram5" placeholder="g" oninput="calc()">
</div>

<div class="amount" id="freeAmount5">
売 0円　<span style="color:#16354d;">買 0円</span>
</div>

</div>

<script>

const items = [

["K24IN",22768],
["K24",22341],
["K22",20432],
["K21.6",19991],
["K20",18533],
["K18",17053],
["K14",12782],
["K10",8970],
["K9",7930],
["K18WG",17066],
["K14WG",12795],

["PT1000IN",8832],
["PT1000",8685],
["PT950",8286],
["PT900",8441],
["PT850",7999],

["18/900 9:1",16021],
["18/900 5:5",12392],
["18/900 1:9",8755],

["18/850 9:1",16006],
["18/850 5:5",12171],
["18/850 1:9",8358],

["SV1000",298],
["SV925",266]

];

const list = document.getElementById("list");

items.forEach((item,i)=>{

list.innerHTML += `
<div class="row">

<div class="name">${item[0]}</div>

<div class="price">
${item[1].toLocaleString()}円
</div>

<input
type="number"
step="0.1"
placeholder="g"
oninput="calc()"
id="g${i}"
style="width:60px;text-align:center;">

<input
type="number"
step="0.1"
value="10"
oninput="calc()"
id="rate${i}"
style="width:60px;">

</div>

<div class="amount" id="a${i}">
売 0円
<span style="color:#16354d;"> 買 0円</span>
</div>
`;
});

function applyRate(){

const rate =
parseFloat(document.getElementById("rate").value) || 0;

items.forEach((item,i)=>{
document.getElementById("rate"+i).value = rate;
});

for(let i=1;i<=5;i++){
document.getElementById("freeRate"+i).value = rate;
}

calc();

}

function calc(){

let total = 0;
let buyTotal = 0;
let freeBuyTotal = 0;

const adjust =
parseInt(document.getElementById("adjust").value) || 0;

items.forEach((item,i)=>{

const g =
parseFloat(document.getElementById("g"+i).value) || 0;

const amount =
Math.round(g * item[1]);

const itemRate =
parseFloat(document.getElementById("rate"+i).value) || 0;

const buyAmount =
Math.round(amount * itemRate / 100);

document.getElementById("a"+i).innerHTML =
"売 " + amount.toLocaleString() + "円　" +
"<span style='color:#16354d;'>買 " +
buyAmount.toLocaleString() +
"円</span>";

total += amount;
buyTotal += buyAmount;

});

for(let i=1;i<=5;i++){

const freePrice =
parseFloat(document.getElementById("freePrice"+i).value) || 0;

const freeGram =
parseFloat(document.getElementById("freeGram"+i).value) || 0;

const freeRate =
parseFloat(document.getElementById("freeRate"+i).value) || 0;

const freeSell =
Math.round(freePrice * freeGram);

const freeBuy =
Math.round(freeSell * freeRate / 100);

document.getElementById("freeAmount"+i).innerHTML =
"売 " + freeSell.toLocaleString() + "円　" +
"<span style='color:#16354d;'>買 " +
freeBuy.toLocaleString() +
"円</span>";

total += freeSell;
freeBuyTotal += freeBuy;

}

document.getElementById("total").innerHTML =
total.toLocaleString() + "円";

const finalBuy =
buyTotal + freeBuyTotal + adjust;

document.getElementById("buyTotal").innerHTML =
finalBuy.toLocaleString() + "円";

document.getElementById("metalTotal").innerHTML =
buyTotal.toLocaleString() + "円";

document.getElementById("freeBuyTotal").innerHTML =
freeBuyTotal.toLocaleString() + "円";

let lossRate = 0;

if(total > 0){
lossRate = (finalBuy / total) * 100;
}

let color = "black";

if(lossRate >= 40){
color = "red";
}
else if(lossRate >= 30){
color = "orange";
}

document.getElementById("lossRate").innerHTML =
'<span style="color:' + color + ';">' +
lossRate.toFixed(1) +
'%</span>';

}

window.onload = function(){

const today = new Date();
const week = ["日","月","火","水","木","金","土"];

document.getElementById("today").innerHTML =
today.getFullYear() + "/" +
String(today.getMonth()+1).padStart(2,"0") + "/" +
String(today.getDate()).padStart(2,"0") +
"（" + week[today.getDay()] + "）";

calc();

};

function sendLineReport(){
  
const staff1 =
document.getElementById("staff1").value || "-";

const staff2 =
document.getElementById("staff2").value || "-";

const buy =
document.getElementById("buyTotal").innerText;

const sale =
document.getElementById("total").innerText;

const profit =
(
parseInt(sale.replace(/[^0-9]/g,"")) -
parseInt(buy.replace(/[^0-9]/g,""))
).toLocaleString() + "円";

const lossRate =
document.getElementById("lossRate").innerText;

const text = `
【売上報告】

担当者①: ${staff1}
担当者②: ${staff2}

買取額: ${buy}
売上: ${sale}
利益: ${profit}
減価率: ${lossRate}`;

window.open(
"https://line.me/R/msg/text/?" +
encodeURIComponent(text)
);

}

function sendDailyReport(title="合算報告"){

  let cases =
  JSON.parse(localStorage.getItem("cases") || "[]");

  if(cases.length === 0){
    alert("保存された案件がありません");
    return;
  }

  let totalBuy = 0;
  let totalSale = 0;
  let totalProfit = 0;
  let validCount = 0;
  
let staffData = {};
let caseText = "";

  cases.forEach(c => {
    const buyNum =
parseInt(c.buy.replace(/[^0-9]/g,"")) || 0;

const saleNum =
parseInt(c.sale.replace(/[^0-9]/g,"")) || 0;

if(buyNum > 0 || saleNum > 0){
    validCount++;
}

const name = c.staff2 || "未入力";
caseText +=
`案件${validCount}
担当：${name}
買取：${c.buy}
売上：${c.sale}
利益：${c.profit}
減価率：${c.lossRate}

`;

if(!staffData[name]){
staffData[name] = {
count:0,
buy:0,
sale:0
};
}

if(buyNum > 0 || saleNum > 0){
    staffData[name].count++;
}

staffData[name].buy +=
parseInt(c.buy.replace(/[^0-9]/g,"")) || 0;

staffData[name].sale +=
parseInt(c.sale.replace(/[^0-9]/g,"")) || 0;

    totalBuy += parseInt(c.buy.replace(/[^0-9]/g,"")) || 0;
    totalSale += parseInt(c.sale.replace(/[^0-9]/g,"")) || 0;
    totalProfit += parseInt(c.profit.replace(/[^0-9]/g,"")) || 0;

  });

let staffText = "";

Object.keys(staffData).forEach(name=>{

const lossRate =
staffData[name].sale > 0
? ((staffData[name].buy / staffData[name].sale) * 100).toFixed(1)
: "0.0";

staffText +=
`${name}
件数：${staffData[name].count}件
買取：${staffData[name].buy.toLocaleString()}円
売上：${staffData[name].sale.toLocaleString()}円
減価率：${lossRate}%

`;

});

const text =
`【${title}】

案件数：${validCount}件

${caseText}

【担当者別合計】

${staffText}

総買取額：
${totalBuy.toLocaleString()}円

総売上：
${totalSale.toLocaleString()}円

総利益：
${totalProfit.toLocaleString()}円`;

  window.open(
    "https://line.me/R/msg/text/?"
    + encodeURIComponent(text)
  );

}
function selectReportType(){

const type = prompt(
"報告種別を入力してください\n\n" +
"1 = 午前報告\n" +
"2 = 日中報告\n" +
"3 = 最終報告"
);

if(type === "1"){
sendDailyReport("午前報告");
}
else if(type === "2"){
sendDailyReport("日中報告");
}
else if(type === "3"){
sendDailyReport("最終報告");
}

}
function saveCase(){

if(!confirm(
"案件を保存しますか？\n\n" +
"買取：" + document.getElementById("buyTotal").innerText + "\n" +
"売上：" + document.getElementById("total").innerText
)){
  return;
}

const staff1 =
document.getElementById("staff1").value || "-";

const staff2 =
document.getElementById("staff2").value || "-";

const buy =
document.getElementById("buyTotal").innerText;

const sale =
document.getElementById("total").innerText;

const profit =
(
parseInt(sale.replace(/[^0-9]/g,"")) -
parseInt(buy.replace(/[^0-9]/g,""))
).toLocaleString() + "円";

const lossRate =
document.getElementById("lossRate").innerText;

let cases =
JSON.parse(localStorage.getItem("cases") || "[]");

cases.push({
date:new Date().toLocaleString(),
staff1,
staff2,
buy,
sale,
profit,
lossRate
});

localStorage.setItem(
"cases",
JSON.stringify(cases)
);

alert("案件を保存しました");

}

function resetAll(){

if(!confirm("本当にリセットしますか？")){
return;
}

document.querySelectorAll("input").forEach(input=>{

if(input.id === "rate"){
input.value = 10;
}
else if(input.id.startsWith("rate")){
input.value = 10;
}
else if(input.id.startsWith("freeRate")){
input.value = 10;
}
else{
input.value = "";
}

});

calc();

}

function resetCases(){

let cases =
JSON.parse(localStorage.getItem("cases") || "[]");

if(!confirm(
cases.length + "件の案件を削除しますか？"
)){
return;
}

localStorage.removeItem("cases");

alert("削除しました");

}

</script>

</body>
</html>
