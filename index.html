<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地金買取計算機</title>

<style>
body{
font-family:sans-serif;
background:#f4f6f8;
margin:0;
padding:15px;
}

.header{
background:#16354d;
color:white;
font-size:32px;
font-weight:bold;
text-align:center;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.row{
display:flex;
align-items:center;
gap:10px;
}

.amount{
width:180px;
text-align:right;
font-weight:bold;
}

.name{
font-weight:bold;
width:180px;
}

.price{
width:80px;
text-align:right;
}

input{
width:90px;
padding:8px;
font-size:16px;
text-align:right;
}

.amount{
width:100%;
text-align:center;
font-weight:bold;
margin-top:8px;
}

.total{
font-size:38px;
font-weight:bold;
text-align:center;
color:#16354d;
}
</style>
</head>

<body>

<div class="header">
地金買取計算機
</div>

<div class="card">
<div class="total" id="total">0円</div>

<div style="text-align:center;margin-top:15px;">
買取率
<input
type="number"
id="rate"
value="11"
style="width:70px;text-align:center;"
oninput="calc()"
> %
</div>

<div class="total" id="buyTotal" style="font-size:28px;">
0円
</div>

<div class="card" id="list"></div>

<script>

const items = [

["K24",23716],
["K22",21689],
["K21.6",21221],
["K20",19674],
["K18",18103],
["K14",13568],
["K10",9522],
["K9",8418],
["WGK18",18117],
["WGK14",13582],

["PT1000",9641],
["PT950",9199],
["PT900",9353],
["PT850",8862],

["SV1000",361],
["SV925",322],

["PT900/K18 9:1",10228],
["PT900/K18 5:5",13727],
["PT900/K18 1:9",17228],

["PT850/K18 9:1",9786],
["PT850/K18 5:5",13483],
["PT850/K18 1:9",17179]

];

const list=document.getElementById("list");

items.forEach((item,i)=>{

list.innerHTML += `
<div class="row">
<div class="name">${item[0]}</div>
<div class="price">${item[1].toLocaleString()}円</div>
<input type="number"
step="0.1"
placeholder="g"
oninput="calc()"
id="g${i}">
</div>

<div class="amount" id="a${i}">
売 0円　買 0円

</div>

</div>
`;

});

function calc(){

let total=0;
let buyTotal=0;

let rate = 11;
items.forEach((item,i)=>{

let g=parseFloat(document.getElementById("g"+i).value)||0;

let amount=Math.round(g*item[1]);

let buyAmount = Math.round(amount * rate / 100);

document.getElementById("a"+i).innerHTML =
"売 " + amount.toLocaleString() + "円　買 " +
buyAmount.toLocaleString() + "円";
total+=amount;
buyTotal+=buyAmount;

});

document.getElementById("buyTotal").innerHTML=
buyTotal.toLocaleString()+"円";

document.getElementById("total").innerHTML=
total.toLocaleString()+"円";

}


</script>

</body>
</html>
